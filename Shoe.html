<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shoe Apparel</title>

    <link rel="stylesheet" href="style.css">
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(to right, #fdfbfb, #ebedee);
}

.header {
    text-align: center;
    padding: 40px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    animation: slideDown 1.2s ease;
}

.header h1 {
    font-size: 3rem;
}

.header p {
    margin-top: 10px;
    font-size: 1.2rem;
}

.cart {
    background: #ffffff;
    margin: 30px auto;
    width: 90%;
    padding: 20px;
    text-align: center;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    animation: fadeIn 1.5s ease;
}

.checkout-btn {
    margin-top: 15px;
    padding: 10px 25px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: transform 0.3s, background 0.3s;
}

.checkout-btn:hover {
    background: #5a67d8;
    transform: scale(1.1);
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    padding: 40px;
}

.product-card {
    background: white;
    padding: 20px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    transition: transform 0.4s, box-shadow 0.4s;
    animation: popUp 1s ease;
}

.product-card:hover {
    transform: translateY(-15px) scale(1.05);
    box-shadow: 0 25px 45px rgba(0,0,0,0.25);
}

.product-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
    transition: transform 0.5s;
    opacity: 0;
    animation: imageFade 0.8s ease forwards;
    
}

.product-card:hover img {
    transform: scale(1.15) rotate(2deg);
    box-shadow: 
        0 0 15px rgba(118, 75, 162, 0.7),
        0 0 30px rgba(102, 126, 234, 0.6);
    transform: scale(1.12);

}

.product-card h3 {
    margin: 15px 0 5px;
}

.product-card p {
    color: #667eea;
    font-weight: bold;
}

.product-card button {
    margin-top: 12px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: #764ba2;
    color: white;
    cursor: pointer;
    transition: background 0.3s, transform 0.3s;
}

.product-card button:hover {
    background: #5a3d91;
    transform: scale(1.1);
}

footer {
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes slideDown {
    from {
        transform: translateY(-60px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes popUp {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
@keyframes imageFade {
    from {
        opacity: 0;
        transform: scale(0.95);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
</style>
<body>

    <header class="header">
        <h1>Shoe Apparel</h1>
        <p>Step Into Style</p>
    </header>

    <section class="cart">
        <h2>Shopping Cart</h2>
        <button class="checkout-btn">Checkout</button>
    </section>

    <section class="products">
        
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Shoe 1">
            <h3>Air Runner</h3>
            <p>₱2,499</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77" alt="Shoe 2">
            <h3>Street Flex</h3>
            <p>₱2,899</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="shoe 3.jpg" alt="Shoe 3">
            <h3>Urban Walk</h3>
            <p>₱2,199</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="shoe 4.jpg" alt="Shoe 4">
            <h3>Cloud Step</h3>
            <p>₱3,199</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="Shoe 5">
            <h3>Night Sprint</h3>
            <p>₱3,499</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1605348532760-6753d2c43329" alt="Shoe 6">
            <h3>Classic Run</h3>
            <p>₱2,699</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a" alt="Shoe 7">
            <h3>Speed Max</h3>
            <p>₱3,899</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1603808033192-082d6919d3e1" alt="Shoe 8">
            <h3>Comfort Pro</h3>
            <p>₱2,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1562183241-b937e95585b6" alt="Shoe 9">
            <h3>Daily Move</h3>
            <p>₱1,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772" alt="Shoe 10">
            <h3>Elite Boost</h3>
            <p>₱4,299</p>
            <button>Add to Cart</button>
        </div>

    </section>

    <footer>
        <p>© 2026  Pe Adiwang Shoe Apparel</p>
    </footer>

</body>
</html>
